<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Background Page</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        .bg-container {
            position: relative;
            width: 100vw;
            height: 100%;
            background-image: url('src/SS.png');
            background-size: cover;
            background-position: top center;
            background-repeat: no-repeat;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
            color: #ffffff;
        }

        /* Teks pojok kanan atas */
        .top-right-text {
            position: absolute;
            top: 10px;
            right: 14px;
            font-size: 13px;
            font-weight: 400;
            letter-spacing: 0.2px;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.6);
        }

        /* Teks di tengah layar */
        .center-text {
            position: absolute;
            top: calc(50% + 150px);
            left: calc(50% + 23px);
            width: 440px;
            transform: translate(-50%, -50%);
            font-size: 18px;
            line-height: 1.5;
            text-align: center;
            color: #000000;
        }
    </style>
</head>
<body>

<div class="bg-container">
    <div class="top-right-text">{{SHORT_TIMESTAMP}}</div>
    <div class="center-text">Anda ({{EMAIL}}) telah memilih <strong>{{COMPANY}}</strong> ({{FULL_TIMESTAMP}}). Apakah Anda ingin memilih BUMN dari sektor lain?</div>
</div>

</body>
</html>
